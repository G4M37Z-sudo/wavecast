# Render Blueprint
# Deploys WaveCast as a single Web Service with WebSocket support.
# After merging to main on GitHub, connect this repo to Render and it
# will pick up this file automatically.
#
# Docs: https://render.com/docs/blueprint-specification
#
# Service names on Render are globally unique. If "wavecast-g4m37z-2026"
# is also taken (very unlikely — it's a random string), pick a new name
# with a longer random suffix and update this file.

services:
  - type: web
    name: wavecast-g4m37z-2026
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/senders
    envVars:
      - key: NODE_VERSION
        value: 22
    autoDeploy: true
